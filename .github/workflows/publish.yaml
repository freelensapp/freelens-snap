name: Publish

on:
  push:
    branches:
      - main
    paths-ignore:
      - .editorconfig
      - .gitignore
      - .markdownlint.yaml
      - .trunk/**
      - LICENSE
      - README.md
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    name: Publish

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
          - runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build snap
        id: build
        uses: snapcore/action-build@v1

      - name: Install snap
        run: sudo snap install --dangerous --classic ${{ steps.build.outputs.snap }}

      - name: Check snap
        run: snap info --verbose freelens

      - uses: snapcore/action-publish@v1
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
        with:
          snap: ${{ steps.build.outputs.snap }}
          release: edge

  promote:
    name: Promote edge to stable

    needs: publish

    runs-on: ubuntu-24.04

    steps:
      - name: Install snapcraft
        run: sudo snap install snapcraft --classic

      - name: Promote edge to stable
        run: snapcraft promote freelens --from-channel edge --to-channel stable --yes
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_TOKEN }}
