name: Test

on:
  push:
    branches-ignore:
      - automated/*
      - renovate/*
      - main
    paths-ignore:
      - .editorconfig
      - .gitignore
      - .markdownlint.yaml
      - .trunk/**
      - LICENSE
      - README.md
  pull_request:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  test:
    name: Test

    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-24.04
          - runs-on: ubuntu-24.04-arm

    runs-on: ${{ matrix.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build snap
        id: build
        uses: snapcore/action-build@v1

      - name: Install snap
        run: sudo snap install --dangerous --classic ${{ steps.build.outputs.snap }}

      - name: Check snap
        run: snap info --verbose freelens
